<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  ul { list-style: none; margin: 0; padding: 0; display: grid; grid-template-columns: 90px 1fr 100px; gap: 6px 12px; align-items: center; }
  li { display: contents; }
  .name { font-family: var(--font-mono); font-size: 12px; }
  .bar { height: 8px; background: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 11px; opacity: 0.65; }
</style>
<ul>
  <li><span class="name">space-1</span><span><span class="bar" style="width:4px"></span></span><span class="val">4 · 0.25rem</span></li>
  <li><span class="name">space-2</span><span><span class="bar" style="width:8px"></span></span><span class="val">8 · 0.5rem</span></li>
  <li><span class="name">space-3</span><span><span class="bar" style="width:12px"></span></span><span class="val">12 · 0.75rem</span></li>
  <li><span class="name">space-4</span><span><span class="bar" style="width:16px"></span></span><span class="val">16 · 1rem</span></li>
  <li><span class="name">space-5</span><span><span class="bar" style="width:24px"></span></span><span class="val">24 · 1.5rem</span></li>
  <li><span class="name">space-6</span><span><span class="bar" style="width:32px"></span></span><span class="val">32 · 2rem</span></li>
  <li><span class="name">space-7</span><span><span class="bar" style="width:48px"></span></span><span class="val">48 · 3rem</span></li>
  <li><span class="name">space-8</span><span><span class="bar" style="width:72px"></span></span><span class="val">72 · 4.5rem</span></li>
</ul>
</body></html>
