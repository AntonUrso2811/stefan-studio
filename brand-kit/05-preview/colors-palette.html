<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Palette</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .s { aspect-ratio: 1.6 / 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; }
  .s .n { font-family: var(--font-sans); font-weight: 600; font-size: 14px; letter-spacing: 0; text-transform: none; }
  .s .h { opacity: 0.7; }
</style>
<div class="swatches">
  <div class="s" style="background:#0f1114;color:#f6f2eb"><span class="n">Ink</span><span class="h">#0f1114</span></div>
  <div class="s" style="background:#f6f2eb;color:#0f1114;border:1px solid #c4bdb4"><span class="n">Bone</span><span class="h">#f6f2eb</span></div>
  <div class="s" style="background:#5b1e24;color:#f6f2eb"><span class="n">Ox-blood</span><span class="h">#5b1e24</span></div>
  <div class="s" style="background:#c4bdb4;color:#0f1114"><span class="n">Stone</span><span class="h">#c4bdb4</span></div>
</div>
</body></html>
