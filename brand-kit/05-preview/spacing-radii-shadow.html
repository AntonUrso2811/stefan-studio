<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Radii &amp; shadow</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .group .label { margin-bottom: 12px; }
  .boxes { display: flex; gap: 10px; align-items: center; }
  .b { width: 54px; height: 40px; background: var(--bone); border: 1px solid var(--ink); font-family: var(--font-mono); font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--ink); opacity: 0.8; }
  .no { width: 100%; padding: 14px; background: var(--bone); border: 1px solid var(--stone); font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
  .cross { text-decoration: line-through; opacity: 0.55; }
</style>
<div class="row2">
  <div class="group">
    <div class="label">Radii — sharp by default</div>
    <div class="boxes">
      <div class="b" style="border-radius:0">0</div>
      <div class="b" style="border-radius:2px">2</div>
      <div class="b cross" style="border-radius:6px">6</div>
      <div class="b cross" style="border-radius:12px">12</div>
    </div>
    <div class="caption-sm" style="margin-top:10px">0 everywhere. 2 px on small controls only.</div>
  </div>
  <div class="group">
    <div class="label">Shadow</div>
    <div class="no">No box-shadow. No elevation. Hairlines and whitespace only.</div>
  </div>
</div>
</body></html>
