<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .card { border: 1px solid var(--stone); padding: 22px 24px; max-width: 520px; background: var(--bone); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); opacity: 0.7; margin-bottom: 6px; }
  h3 { font-family: var(--font-serif); font-weight: 600; font-size: 26px; margin: 0 0 4px 0; letter-spacing: -0.01em; font-variation-settings: "opsz" 32; }
  .price { font-family: var(--font-mono); font-size: 22px; color: var(--ox-blood); margin: 0; }
  .freq  { font-family: var(--font-mono); font-size: 11px; opacity: 0.65; margin: 0 0 12px 0; }
  p { font-family: var(--font-sans); font-size: 14px; line-height: 1.55; margin: 0 0 14px 0; color: var(--ink); opacity: 0.9; max-width: none; }
  .cta { display: inline-flex; font-family: var(--font-sans); font-size: 13px; font-weight: 500; padding: 9px 14px; background: var(--ink); color: var(--bone); border: 1px solid var(--ink); border-radius: 2px; }
</style>
<div class="card">
  <div class="eyebrow">Tier · audit</div>
  <h3>Audit</h3>
  <div class="price">£1,497</div>
  <div class="freq">one-time, fixed</div>
  <p>5-day sprint. Ops map, working proof-of-concept, brand-voice spec, 90-day roadmap. Delivered before any retainer is proposed.</p>
  <span class="cta">Book the audit — £1,497</span>
</div>
</body></html>
