<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  p { font-family: var(--font-sans); font-size: 14px; line-height: 1.5; margin: 0 0 6px 0; max-width: none; }
  .rule { border-top: 1px solid var(--stone); margin: 10px 0; }
  .mono { font-family: var(--font-mono); font-size: 13px; }
  .ok { color: var(--ink); }
  .no { color: var(--ox-blood); text-decoration: line-through; opacity: 0.85; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; }
</style>
<span class="tag">Allowed glyphs · typographic cadence only</span>
<p class="mono ok">&mdash; &nbsp; &middot; &nbsp; &ndash; &nbsp; &pound; &nbsp; &amp;</p>
<div class="rule"></div>
<span class="tag">Banned · decorative marks</span>
<p class="mono no">&rarr; &nbsp; &#10003; &nbsp; &#9679; &nbsp; &#9654; &nbsp; 🚀 &nbsp; ✨</p>
<p class="caption" style="margin-top:8px">No icon font. No icon sprite. If UI chrome truly needs a mark, inline SVG at 1.5 px stroke, Ink.</p>
</body></html>
