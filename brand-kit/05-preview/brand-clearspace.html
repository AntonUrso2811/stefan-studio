<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Clear space</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .frame { position: relative; border: 1px solid var(--stone); padding: 0; height: 150px; display: flex; align-items: center; justify-content: center; background: repeating-linear-gradient(45deg, transparent 0 8px, rgba(196,189,180,0.3) 8px 9px); }
  .inner { background: var(--bone); padding: 32px 48px; display: flex; align-items: center; }
  .inner img { height: 42px; width: auto; display: block; }
  .caption { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; margin-top: 8px; }
</style>
<div class="frame"><div class="inner"><img src="../assets/wordmark-primary.svg" alt="Urso &amp; Co"></div></div>
<div class="caption">Clear space = 1 × cap-height on every side. Nothing inside the box.</div>
</body></html>
