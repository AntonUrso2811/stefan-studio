<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Links</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  p { font-family: var(--font-sans); font-size: 15px; line-height: 1.6; margin: 0 0 10px 0; color: var(--ink); max-width: 58ch; }
  a { color: var(--ox-blood); text-decoration: none; border-bottom: 1px solid transparent; transition: color 120ms ease, border-color 120ms ease; }
  a.hover { color: color-mix(in oklab, var(--ox-blood) 75%, var(--bone) 25%); border-bottom-color: currentColor; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 2px; }
</style>
<span class="tag">Inline link — rest</span>
<p>Five days. Fixed price. <a href="#">See the audit deliverables</a>, then book a call.</p>
<span class="tag">Inline link — hover</span>
<p>Five days. Fixed price. <a href="#" class="hover">See the audit deliverables</a>, then book a call.</p>
</body></html>
