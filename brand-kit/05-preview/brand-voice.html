<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Voice</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { border: 1px solid var(--stone); padding: 14px 16px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .do { color: var(--ink); }
  .no { color: var(--ox-blood); }
  p { font-family: var(--font-sans); font-size: 14px; line-height: 1.5; margin: 0 0 8px 0; color: var(--ink); max-width: none; }
  .col.no p { opacity: 0.8; }
</style>
<div class="grid">
  <div class="col"><span class="tag do">Do · operator</span>
    <p>"Five days. £1,497. Working system at the end of it."</p>
    <p>"Your Gorgias queue is 340 tickets deep on Mondays."</p>
  </div>
  <div class="col no"><span class="tag no">Don't · consultant</span>
    <p>"Our comprehensive AI readiness audit delivers transformational insights."</p>
    <p>"We unlock seamless, cutting-edge customer experience."</p>
  </div>
</div>
</body></html>
