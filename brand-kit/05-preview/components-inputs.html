<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .field { margin-bottom: 14px; }
  label { display: block; font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; color: var(--ink); }
  input, textarea { font-family: var(--font-sans); font-size: 15px; color: var(--ink); background: var(--bone); border: 1px solid var(--stone); border-radius: 2px; padding: 10px 12px; width: 100%; outline: none; }
  input:focus, textarea:focus { border-color: var(--ink); }
  .focused { border-color: var(--ox-blood); box-shadow: 0 0 0 2px rgba(91,30,36,0.15); }
</style>
<div class="field"><label>Brand name</label><input type="text" value="Acme Skincare"></div>
<div class="field"><label>Top one operational pain right now</label><textarea rows="2" class="focused">CX queue runs 340 tickets deep every Monday and eats my week.</textarea></div>
</body></html>
