<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Rules &amp; dividers</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .block { padding: 10px 0; }
  h3 { font-family: var(--font-serif); font-weight: 600; font-size: 20px; margin: 0 0 4px 0; letter-spacing: -0.01em; }
  p { font-family: var(--font-sans); font-size: 13px; line-height: 1.5; margin: 0; color: var(--ink); opacity: 0.85; }
  .r1 { border-top: 1px solid var(--stone); margin: 14px 0; }
  .r2 { border-top: 1px solid var(--ox-blood); margin: 14px 0; width: 48px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; }
</style>
<div class="block">
  <span class="tag">Stone hairline · structural</span>
  <div class="r1"></div>
  <h3>Sections divide with whitespace and hairlines.</h3>
  <p>1 px Stone. Never dashed, never dotted, never double.</p>
</div>
<div class="block">
  <span class="tag">Ox-blood short rule · one-mark accent</span>
  <div class="r2"></div>
  <h3>The one accent rule.</h3>
  <p>48 px Ox-blood stub, used once per asset. Spends the ox-blood budget.</p>
</div>
</body></html>
