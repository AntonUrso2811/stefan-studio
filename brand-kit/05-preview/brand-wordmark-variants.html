<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><title>Wordmark variants</title><link rel="stylesheet" href="_card.css"></head><body>
<style>
  .grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; align-items: stretch; }
  .mark { display: flex; align-items: center; justify-content: center; border: 1px solid var(--stone); padding: 18px; background: var(--bone); min-height: 120px; }
  img { max-width: 100%; max-height: 80px; display: block; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.65; margin-bottom: 6px; }
</style>
<div class="grid">
  <div><div class="label">Lockup — descriptor</div><div class="mark"><img src="../assets/wordmark-lockup.svg" alt="Urso &amp; Co — AI Operations Studio"></div></div>
  <div><div class="label">Stacked</div><div class="mark"><img src="../assets/wordmark-stacked.svg" alt="Urso &amp; Co"></div></div>
  <div><div class="label">Monogram</div><div class="mark"><img src="../assets/wordmark-monogram.svg" alt="U"></div></div>
</div>
</body></html>
